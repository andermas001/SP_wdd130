<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <table>
          <tr>
            <th style="width:25%">Speaker</th>
            <th style="width:25%">Title</th>
            <th style="width:25%">Location</th>
            <th style="width:25%">Year</th>
          </tr>
          <tr>
            <td>Lawrence E. Corbridge</td>
            <td>Stand Forever</td>
            <td>BYU</td>
            <td>2019</td>
          </tr>
          <tr>
            <td>Kalani Sitake</td>
            <td>Discovering God’s Plan for You</td>
            <td>BYU</td>
            <td>2025</td>
          </tr>
          <tr>
            <td>Jeffrey R. Holland</td>
            <td>“Remember Lot’s Wife”</td>
            <td>BYU</td>
            <td>2009</td>
          </tr>
        </table>
        <form>
          <label for="speaker">Speaker:</label><br>
          <input type="text" id="speaker" name="speaker"><br>
          <label for="title">Title:</label><br>
          <input type="text" id="title" name="title"><br>
          <label for="location">Location:</label><br>
          <input type="text" id="location" name="location"><br>
          <label for="year">Year:</label><br>
          <input type="text" id="year" name="year"><br>
          <br>
          <input type="submit" value="Submit">
        </form>
      </div>
    </main>
  </div>
</body>
</html>
