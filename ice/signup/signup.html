<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing:border-box;
        }

        #formContainer {
            background: white;
            width: 500px;
            border-radius: 20px;
            border: 8px solid rgb(24, 24, 118);
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto auto auto auto;
            overflow: hidden;
            position: relative;
        }

        #myForm {
            padding: 0 30px 20px 30px;
            display: flex;
            flex-direction: column;
        }

        #imageContainer {
            position: relative;
            width: 100%;
        }

        #imageContainer img {
            width: 100%;
            display: block;
            height: 180px;
            object-fit: cover;
            position: relative;
            top: -20px;
        }

        #header-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px black;
            width: 100%;
        }

        #x {
            position: relative;
            top: 15px;
            left: 15px;
            z-index: 10;
        }

        #footerImages {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
        }

        #footerImages img {
            width: 100%;
            height: auto;
            display: block;
            gap: 10px;
        }

        body {
            background: rgb(120, 96, 64);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

          h3 {
            text-align: center;
            margin: 20px 0 10px 0;
        }

        label {
            font-weight: bold;
        }

    </style>




</head>

<body>
    <div id="formContainer">
        <div id="x">
                <button type="button" id="closeBtn">X</button>
            </div>
        <div id="imageContainer">
            <img src="images/jesus_feeds_5000.jpeg" alt="Jesus feeds 5000">
            <div id="header-text">
                <h1>Daily Feed</h1>
                <h2>Scripture a day</h2>
            </div>
        </div>

        <h3>Sign Up for Daily Scripture Feed</h3>

        <form id="myForm">
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required> 

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required> 

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required> 

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>   
        </form>

        <div id ="footerImages">
            <img src="images/old_testament.webp" alt ="old testament">
            <img src="images/new_testament.webp" alt ="new testament">
            <img src="images/book_of_mormon.webp" alt ="book of mormon">
            <img src="images/doctrine_and_covenants.webp" alt ="doctrine and covenants">
            <img src="images/pearl_of_great_price.webp" alt ="Pearl of Great Price">
        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
